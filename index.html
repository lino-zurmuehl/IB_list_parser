<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IB List Job Filter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero panel">
        <h1>Job Feed</h1>
        <p>Unified feed from IB-list digests and LinkedIn job alerts.</p>
      </header>

      <section class="panel output-panel">
        <div class="output-header">
          <div>
            <h2>Current Openings</h2>
            <p>Filter the feed by relevance and source.</p>
          </div>
          <button id="refreshBtn" type="button">Refresh feed</button>
        </div>
        <div class="feed-controls">
          <label class="checkbox">
            <input type="checkbox" id="jobsOnly" checked />
            Job-related
          </label>
          <label class="checkbox">
            <input type="checkbox" id="dsPolicyOnly" />
            DS + Policy fit
          </label>
          <label class="checkbox">
            <input type="checkbox" id="linkedinOnly" />
            LinkedIn only
          </label>
        </div>
        <div class="summary" id="summary">Loading feed...</div>
        <div id="results" class="results"></div>
      </section>

      <section class="panel input-panel">
        <details>
          <summary>Manual Parser Fallback</summary>
          <label for="digestInput">Digest email text</label>
          <textarea id="digestInput" placeholder="Paste full digest email here..."></textarea>

          <div class="controls">
            <button id="parseBtn" type="button">Parse pasted digest</button>
            <button id="clearBtn" type="button" class="ghost">Clear</button>
          </div>

          <p class="hint">Use this only if the automated feed is not updated yet.</p>
        </details>
      </section>
    </main>

    <template id="itemTemplate">
      <article class="card">
        <div class="card-header">
          <h2 class="title"></h2>
          <div class="card-tags">
            <span class="source-badge"></span>
            <span class="badge"></span>
          </div>
        </div>
        <dl class="meta"></dl>
        <div class="links"></div>
        <div class="snippet-wrap">
          <div class="snippet-label">Message excerpt</div>
          <pre class="snippet"></pre>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
